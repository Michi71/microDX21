# microdx21.ini – microDX21 application configuration
#
# Place this file on the boot partition of your SD card, alongside
# kernel_rpi{3,4,5}.img, config.txt, and cmdline.txt.
#
# All keys are optional; missing values fall back to the defaults
# shown after the `=`. Lines starting with `#` are comments.
#
# The defaults match the canonical setup:
#   - Raspberry Pi 3/4/5 bare-metal
#   - PCM5102A I2S DAC on the standard pins
#   - SSD1305 128x32 SPI OLED (e.g. 2.23" waveshare)
#   - KY-040 rotary encoder on GPIO 10/9/11
#   - USB-Host mode (DIN-MIDI adapter on USB-A)
#

# ───────────────────────────────────────────────
# Audio
# ───────────────────────────────────────────────

# Backend: "i2s" (PCM5102A) or "pwm" (on-board headphone jack)
SoundDevice=i2s

SampleRate=48000
ChunkSize=256

# I2C address of the DAC. 0 = on-board PWM (no DAC needed).
DACI2CAddress=0

# Swap L/R channels. Useful if the DAC is wired backwards.
ChannelsSwapped=0

# Diagnostic: output a 440 Hz sine wave instead of synth audio.
# 0 = normal synth, 1 = test tone.
TestTone=0

# ───────────────────────────────────────────────
# Polyphony
#
# 8 voices = full dual-OPM with all 4 ops; 16 = dual YM2151, etc.
# Hard cap: 88 (NVOICES in the OPM emulator).
# ───────────────────────────────────────────────
Polyphony=64

# ───────────────────────────────────────────────
# Master Volume
# 0..127, maps to 0..1 in the synth. 100 ≈ unity.
# ───────────────────────────────────────────────
MasterVolume=100

# ───────────────────────────────────────────────
# MIDI
# ───────────────────────────────────────────────

# Serial MIDI baud rate (DIN-MIDI on UART GPIO).
MIDIBaudRate=31250

# Forward all received MIDI back to USB-MIDI out.
# Unfiltered (works regardless of MIDIChannel below).
MIDIThruEnabled=1

# Velocity-curve shaping for incoming NoteOn events. Reshapes the raw
# MIDI velocity (0..127) with a power curve of the form
#   vel_out = round( (vel_in / 127) ^ p * 127 )
# where p is the curve-specific exponent:
#   linear   (p=1.0) — passthrough, no shaping
#   soft     (p=1.3) — slightly convex, low velocities reduced
#   hard     (p=0.7) — concave, low velocities boosted
#   dx21     (p=1.5) — closest to the original DX21's feel
#   softest  (p=2.0) — piano-like, low velocities much softer
# Either the named string (case-insensitive) or the integer (0..4) is
# accepted. Unknown values fall back to linear.
#VelocityCurve=dx21

# Channel filter for channel-voice messages (notes, CC, PC, pitch bend).
# 0   = Omni (accept all channels)
# 1..16 = accept only this channel
# SysEx and system real-time (clock, start/stop/continue) always pass.
MIDIChannel=0

# ───────────────────────────────────────────────
# USB
# ───────────────────────────────────────────────
#
# The synth Pi is always USB Host (DWC2/xHCI). USB-MIDI Gadget mode
# is no longer handled in-kernel; an external RP2350 "Comms"
# processor (pico-midi-adapter) bridges USB-MIDI to UART RX/TX on
# GPIO 14/15. The host connects through that Comms Pi.
#
# Plug a DIN-MIDI adapter into the Pi's USB-A port for now; later,
# MIDI comes from the Comms Pi over UART.

# ───────────────────────────────────────────────
# Display (128x32 SSD1305/SH1106 OLED)
# ───────────────────────────────────────────────

# 0 = run headless (no OLED rendering), 1 = render the 5-mode UI.
DisplayEnabled=1

# Controller: ssd1305 | ssd1306 | sh1106
DisplayType=ssd1305

# Bus: spi | i2c
DisplayBus=spi

# Resolution (most 128x32 OLEDs are SH1106/SSD1305; 128x64 also works)
DisplayWidth=128
DisplayHeight=32

# ───────────────────────────────────────────────
# I2C settings (used when DisplayBus=i2c)
# ───────────────────────────────────────────────
DisplayI2CAddress=0x3C

# ───────────────────────────────────────────────
# SPI settings (used when DisplayBus=spi)
# ───────────────────────────────────────────────

# SPI controller: 0 = SPI0, 1 = SPI1
DisplaySPIBus=0

# SPI mode: 0..3 (CPOL << 1 | CPHA). Mode 0 is the OLED default.
DisplaySPIMode=0

DisplaySPIDCPin=24
DisplaySPIResetPin=25
DisplaySPISpeed=8000000

# ───────────────────────────────────────────────
# Rotary encoder (KY-040, 3 pins, BCM numbering)
# ───────────────────────────────────────────────
EncoderPinA=5
EncoderPinB=6
EncoderPinBtn=13


# ───────────────────────────────────────────────
# SD card layout (cassette / bank persistence)
# ───────────────────────────────────────────────
#
# All paths are relative to the SD card root.
# The release pipeline (.github/workflows/build.yml) and the helper
# scripts/prepare_sd_skeleton.sh pre-create the 16 bank directories
# on the SD image at build time. The synth also has a runtime fallback
# (IFileSystem::MakeDirectory) for users who flash the kernel image
# onto an otherwise empty SD card.
#
# The synth code does NOT read these keys at runtime yet; the
# constants are duplicated in src/opm/memory/dx21_memory.cpp and
# src/audio/opmemuadapter.h. Keep them in sync.

SDBaseDir=MICRODX21
SDBankPrefix=BANK_
SDBankCount=16
SDBankDigits=2
SDPerformanceFile=performances.json
